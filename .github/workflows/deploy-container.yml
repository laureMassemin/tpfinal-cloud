on:
 push:
    branches: 
      -main 
 pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image
        run: docker build -t -build-arg BUILD_ID=${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }} .
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: mon-app-conteneur-laure-exam
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/vue-app:${{ github.sha }}